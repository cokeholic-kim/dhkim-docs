<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FB7185"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
  </defs>

  <rect x="12" y="12" width="1176" height="376" rx="28" fill="url(#bg)" stroke="#334155" stroke-width="2"/>

  <!-- Icon block -->
  <g transform="translate(70,70)">
    <rect x="0" y="0" width="260" height="260" rx="36" fill="#020617" stroke="#334155" stroke-width="2"/>

    <!-- Martini glass -->
    <path d="M52 54H208L130 146L52 54Z" fill="url(#glass)" opacity="0.95"/>
    <rect x="122" y="146" width="16" height="56" rx="8" fill="#93C5FD"/>
    <rect x="88" y="202" width="84" height="12" rx="6" fill="#60A5FA"/>

    <!-- Olive / garnish -->
    <circle cx="170" cy="82" r="14" fill="url(#accent)"/>
    <circle cx="166" cy="78" r="4" fill="#FDE68A"/>

    <!-- straw -->
    <path d="M95 46L158 90" stroke="#FCA5A5" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(380,120)">
    <text x="0" y="80" font-family="Inter, Pretendard, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="800" fill="#E2E8F0">Cocktail Project</text>
    <text x="0" y="142" font-family="Inter, Pretendard, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="500" fill="#94A3B8">Next.js × FastAPI Migration Blueprint</text>
  </g>
</svg>
